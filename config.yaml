# RAG System Configuration

# PDF Processing
pdf:
  input_path: "data/raw/openstax_psychology_2e.pdf"
  extract_images: false
  preserve_layout: true

# Text Chunking
chunking:
  strategy: "recursive"  # recursive, fixed, semantic
  chunk_size: 800        # ~150-200 words; sweet spot for dense academic text
  chunk_overlap: 100     # 100-char overlap preserves cross-boundary context
  min_chunk_size: 150    # discard captions / stray headers shorter than this
  respect_sentence_boundaries: true

# Embedding (Tiered Model Selection)
embedding:
  # Tier: fast, balanced, or deep
  # - fast: all-MiniLM-L6-v2 (384 dim, 80MB, ~2 min for 4k chunks)
  # - balanced: BAAI/bge-base-en-v1.5 (768 dim, 438MB, ~6 min) [DEFAULT]
  # - deep: BAAI/bge-large-en-v1.5 (1024 dim, 1.34GB, ~15 min)
  tier: "balanced"
  batch_size: 32
  normalize: true
  device: "auto"  # auto, cpu, or cuda
  cache_enabled: true

# Vector Store (PostgreSQL + pgvector)
vector_store:
  type: "pgvector"
  connection:
    host: "localhost"
    port: 5432
    database: "rag_db"
    user: "postgres"
    password: "${POSTGRES_PASSWORD}"  # From .env
  table_name: "document_chunks"
  vector_dimensions: 768  # Must match embedding tier (384 for fast, 768 for balanced, 1024 for deep)
  index_type: "ivfflat"  # or "hnsw" for better performance
  lists: 100  # for ivfflat
  probes: 10  # for ivfflat search

# Retrieval
retrieval:
  top_k: 5
  score_threshold: null  # Optional minimum similarity score
  rerank: false

# Generation (NVIDIA API)
generation:
  model: "meta/llama-3.1-8b-instruct"
  temperature: 0.2
  max_tokens: 512
  top_p: 0.9

# Caching
cache:
  enabled: true
  embeddings_dir: "embeddings/cache"
  processed_chunks_path: "data/processed/chunks.jsonl"
  use_content_hash: true

# Reproducibility
reproducibility:
  random_seed: 42
  deterministic: true

# Logging
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "logs/rag_system.log"

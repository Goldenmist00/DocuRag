# RAG System Configuration

# PDF Processing
pdf:
  input_path: "data/raw/openstax_psychology_2e.pdf"

# Text Chunking
chunking:
  chunk_size: 800        # ~150-200 words; sweet spot for dense academic text
  chunk_overlap: 100     # 100-char overlap preserves cross-boundary context
  min_chunk_size: 150    # discard captions / stray headers shorter than this

# Embedding — NVIDIA API (nv-embed-v1, 4096d)
embedding:
  tier: "nvidia"

# Vector Store (PostgreSQL + pgvector)
vector_store:
  type: "pgvector"
  connection:
    host: ""      # Read from POSTGRES_HOST env var
    port: 5432
    database: ""  # Read from POSTGRES_DB env var
    user: ""      # Read from POSTGRES_USER env var
    password: ""  # Always read from POSTGRES_PASSWORD env var
  table_name: "document_chunks"
  index_type: "hnsw"
  lists: 100  # for ivfflat (if used)
  probes: 10  # for ivfflat search (if used)

# Retrieval
retrieval:
  top_k: 5
  score_threshold: null

# Generation (NVIDIA primary → Groq fallback)
generation:
  model: "meta/llama-3.3-70b-instruct"
  temperature: 0.3
  max_tokens: 512
  top_p: 0.9

# Caching
cache:
  enabled: true
  embeddings_cache: "embeddings/cache"
  processed_chunks_path: "data/processed/chunks.jsonl"

# Logging
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "logs/rag_system.log"
